<div class="layout">
  <main class="content">
    <header class="topbar">
      <h1>Painel de Tarefas</h1>

      <div class="topbar-right">
        <span class="topbar-item">22 de Maio de 2024</span>
        <span class="topbar-item">10:30</span>
        <span class="avatar">👤</span>
      </div>
    </header>

    <section class="board">
      <div class="column a-fazer">
        <div class="column-header">
          <h2>À Fazer</h2>
          <span class="count count-red">3 tarefas</span>
        </div>

        <div class="column-body">
          <app-task-card [tarefa]="tarefas[0]"></app-task-card>
        </div>
      </div>

      <div class="column em-andamento">
        <div class="column-header">
          <h2>Em Andamento</h2>
          <span class="count count-yellow">3 tarefas</span>
        </div>

        <div class="column-body">
          <app-task-card [tarefa]="tarefas[0]"></app-task-card>
        </div>
      </div>

      <div class="column aguardando">
        <div class="column-header">
          <h2>Aguardando</h2>
          <span class="count count-green">3 tarefas</span>
        </div>

        <div class="column-body">
          <app-task-card [tarefa]="tarefas[0]"></app-task-card>
        </div>
      </div>
    </section>

    <footer class="footer">
      © 2024 Sua Empresa. Todos os direitos reservados.
    </footer>
  </main>
</div>
